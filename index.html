<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APPLE 序號查詢工具</title>
  <!-- 導入 Google Fonts Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- 導入 JsBarcode 與 html5-qrcode CDN -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

  <style>
    :root {
      --bg-color: #f5f5f7; /* 蘋果官方經典淺灰背景 */
      --panel-bg: #ffffff; /* 純白面板 */
      --panel-border: rgba(0, 0, 0, 0.08);
      --text-primary: #1d1d1f; /* 蘋果主文字深灰/黑 */
      --text-secondary: #86868b; /* 蘋果次要文字中灰 */
      --accent-primary: #0071e3; /* 蘋果經典亮藍色 */
      --accent-primary-hover: #0077ed;
      --accent-secondary: #f5f5f7;
      --accent-success: #30d158; /* iOS 綠色 */
      --accent-danger: #ff453a; /* iOS 紅色 */
      --card-bg: #ffffff;
      --card-border: rgba(0, 0, 0, 0.06);
      --card-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
      --input-bg: #ffffff;
      --input-border: #d2d2d7; /* 蘋果標準輸入框邊框 */
      --input-focus: #0071e3;
      --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, "Inter", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: var(--font-family);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* 頂部標題 - Apple 極簡風 */
    header {
      text-align: center;
      margin-bottom: 3.5rem;
      width: 100%;
      max-width: 1100px;
      animation: fadeIn 0.8s ease-out;
    }

    header h1 {
      font-size: 2.75rem;
      font-weight: 700;
      letter-spacing: -0.022em;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }

    header p {
      color: var(--text-secondary);
      font-size: 1.15rem;
      font-weight: 400;
      letter-spacing: -0.011em;
    }

    /* 主容器 */
    .main-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2.5rem;
      width: 100%;
      max-width: 1100px;
      animation: fadeInUp 0.8s ease-out;
    }

    @media (min-width: 1024px) {
      .main-container {
        grid-template-columns: 4.5fr 7.5fr;
      }
    }

    /* 蘋果風格白色面板 */
    .glass-panel {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.03);
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    .panel-title {
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.015em;
      margin-bottom: 0.25rem;
    }

    /* 輸入區 */
    .input-wrapper {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .input-label {
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    textarea {
      width: 100%;
      height: 130px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 1.25rem;
      resize: none;
      transition: all 0.2s ease-out;
      outline: none;
      line-height: 1.5;
    }

    textarea:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
    }

    textarea::placeholder {
      color: #b2b2b7;
    }

    /* 按鈕樣式 - Apple 扁平圓角按鈕 */
    .btn-group {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.85rem;
    }

    @media (min-width: 480px) {
      .btn-group {
        grid-template-columns: 1fr 1fr;
      }
      .btn-clear {
        grid-column: span 2;
      }
    }

    button {
      font-family: inherit;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 0.85rem 1.25rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.2s ease-out;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background-color: var(--text-primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: #333336;
    }

    .btn-success {
      background-color: var(--accent-primary);
      color: white;
    }

    .btn-success:hover {
      background-color: #0077ed;
    }

    .btn-outline {
      background-color: #f5f5f7;
      color: var(--text-primary);
      border: 1px solid rgba(0, 0, 0, 0.04);
    }

    .btn-outline:hover {
      background-color: #e8e8ed;
    }

    /* 錯誤訊息 */
    .error-box {
      background: rgba(255, 69, 58, 0.08);
      border: 1px solid rgba(255, 69, 58, 0.15);
      color: #ff453a;
      padding: 1rem 1.25rem;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 0.65rem;
      animation: shake 0.5s ease-in-out;
    }

    .error-box svg {
      flex-shrink: 0;
    }

    /* 結果展示區 */
    .results-container {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      min-height: 250px;
    }

    /* 空狀態 */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--text-secondary);
      text-align: center;
      margin: auto;
      padding: 3rem 0;
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      stroke: #d2d2d7;
    }

    .empty-state p {
      font-size: 0.95rem;
      font-weight: 400;
    }

    /* 屬性卡片 - Apple 白色簡約卡片 */
    .result-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: var(--card-shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .result-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.06);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-info {
      display: flex;
      flex-direction: column;
    }

    .field-name {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .field-value {
      font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, Courier, monospace;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: 0.02em;
      word-break: break-all;
    }

    /* 一維條碼裝飾 */
    .barcode-wrapper {
      background: #ffffff;
      padding: 0.75rem;
      border-radius: 10px;
      border: 1px solid rgba(0, 0, 0, 0.04);
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .barcode-wrapper svg {
      max-width: 100%;
      height: auto;
    }

    /* 複製按鈕 - 經典 Apple 文字按鈕 */
    .btn-copy {
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.45rem 0.9rem;
      border-radius: 20px;
      background-color: #f5f5f7;
      color: var(--accent-primary);
      border: none;
      transition: all 0.2s ease;
    }

    .btn-copy:hover {
      background-color: #e8e8ed;
    }

    .btn-copy.copied {
      background-color: #30d158;
      color: white;
      animation: pop 0.3s ease-out;
    }

    /* 鏡頭掃描 Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 1000;
      padding: 1.5rem;
    }

    .modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.05);
      width: 100%;
      max-width: 480px;
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      transform: scale(0.96);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .modal.active .modal-content {
      transform: scale(1);
    }

    .modal-header {
      padding: 1.25rem 1.75rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .btn-close {
      background: #f5f5f7;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 0.35rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .btn-close:hover {
      color: var(--text-primary);
      background: #e8e8ed;
    }

    /* 掃描畫面容器 */
    .scanner-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #000;
      overflow: hidden;
    }

    #reader {
      width: 100%;
      height: 100%;
      border: none !important;
    }

    /* 隱藏 html5-qrcode 內部 UI */
    #reader video {
      object-fit: cover !important;
      width: 100% !important;
      height: 100% !important;
    }
    
    #reader__header_message, #reader__dashboard {
      display: none !important;
    }

    /* 覆蓋的對焦框與十字線 */
    .scanner-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .scan-region-box {
      width: 65%;
      height: 65%;
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      border-radius: 16px;
      position: relative;
      box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.55); /* 暗色遮罩 */
    }

    /* 藍色蘋果風對焦角隅 */
    .scan-corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border: 3px solid var(--accent-primary);
      pointer-events: none;
    }

    .corner-tl { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 6px; }
    .corner-tr { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 6px; }
    .corner-bl { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 6px; }
    .corner-br { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 6px; }

    /* 十字線 */
    .crosshair-h {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 24px;
      height: 1.5px;
      background: rgba(255, 255, 255, 0.5);
    }

    .crosshair-v {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1.5px;
      height: 24px;
      background: rgba(255, 255, 255, 0.5);
    }

    /* 縮放控制滑桿 - 蘋果官網極簡風 */
    .zoom-control-container {
      padding: 1.25rem 1.75rem;
      background: #ffffff;
      border-top: 1px solid rgba(0, 0, 0, 0.05);
      display: flex;
      align-items: center;
      gap: 1rem;
      justify-content: space-between;
    }

    .zoom-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
      white-space: nowrap;
    }

    #zoom-slider {
      flex-grow: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: #e5e5ea;
      border-radius: 3px;
      outline: none;
    }

    #zoom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #ffffff;
      border: 0.5px solid rgba(0, 0, 0, 0.04);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12), 0 1px 1px rgba(0, 0, 0, 0.12);
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    #zoom-slider::-webkit-slider-thumb:active {
      transform: scale(1.15);
    }

    .zoom-value {
      font-family: monospace;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
      min-width: 42px;
      text-align: right;
    }

    /* 頁尾 */
    footer {
      margin-top: 4rem;
      color: var(--text-secondary);
      font-size: 0.85rem;
      text-align: center;
      width: 100%;
    }

    /* 歷史紀錄面板 */
    .history-panel {
      margin-top: 0.5rem;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .history-actions {
      display: flex;
      gap: 0.5rem;
    }

    .btn-action {
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-weight: 500;
      border: 1px solid rgba(0, 0, 0, 0.05);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-action-primary {
      background-color: var(--accent-primary);
      color: white;
    }

    .btn-action-primary:hover {
      background-color: #0077ed;
    }

    .btn-action-danger {
      background-color: #f5f5f7;
      color: #ff453a;
      border-color: rgba(255, 69, 58, 0.08);
    }

    .btn-action-danger:hover {
      background-color: rgba(255, 69, 58, 0.05);
    }

    .history-list {
      max-height: 380px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding-right: 0.25rem;
    }

    .history-list::-webkit-scrollbar {
      width: 5px;
    }

    .history-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .history-list::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 3px;
    }

    .history-row {
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
      transition: all 0.2s ease;
    }

    .history-row:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.03);
      border-color: rgba(0, 0, 0, 0.08);
    }

    .history-row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(0, 0, 0, 0.03);
      padding-bottom: 0.35rem;
    }

    .history-time {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .history-row-actions {
      display: flex;
      gap: 0.35rem;
    }

    .btn-row-action {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .btn-row-action:hover {
      background-color: #f5f5f7;
      color: var(--accent-primary);
    }

    .btn-row-action-danger:hover {
      background-color: rgba(255, 69, 58, 0.05);
      color: #ff453a;
    }

    .history-details {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      font-size: 0.88rem;
      margin-top: 0.35rem;
    }

    .history-val {
      font-family: SFMono-Regular, Consolas, monospace;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-primary);
      word-break: break-all;
    }

    .history-empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
      border: 1px dashed rgba(0, 0, 0, 0.06);
      border-radius: 12px;
    }

    /* 動畫 */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); }
      20%, 40%, 60%, 80% { transform: translateX(3px); }
    }
  </style>
</head>
<body>

  <header>
    <h1>APPLE 序號查詢工具</h1>
    <p>支援 Apple 外盒 QR Code (GS1 Digital Link) 解析與一維條碼快速轉換</p>
  </header>

  <main class="main-container">
    
    <!-- 左側控制面板 -->
    <section class="glass-panel">
      <h2 class="panel-title">輸入與掃描</h2>
      
      <div class="input-wrapper">
        <label for="qr-input" class="input-label">請掃描或輸入 QR Code 內容：</label>
        <textarea 
          id="qr-input" 
          placeholder="https://boxinfo.apple.com/122530/01/00195950639100/21/LXHX0J4C7V?8040=358361787063001..."
          spellcheck="false"
        ></textarea>
      </div>

      <div class="error-box" id="error-message">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <span id="error-text">錯誤訊息</span>
      </div>

      <div class="btn-group">
        <button class="btn-success" id="btn-scan">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          鏡頭掃描
        </button>
        
        <button class="btn-primary" id="btn-parse">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
          解析內容
        </button>
        
        <button class="btn-outline btn-clear" id="btn-clear">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
          清除
        </button>
      </div>
    </section>

    <!-- 右側結果展示面板 -->
    <div style="display: flex; flex-direction: column; gap: 2rem;">
      <section class="glass-panel">
        <h2 class="panel-title">解析結果</h2>
        
        <div class="results-container" id="results-container">
          <!-- 初始空狀態 -->
          <div class="empty-state" id="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 013.75 9.375v-4.5zM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 01-1.125-1.125v-4.5zM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0113.5 9.375v-4.5z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 6.75h.75v.75h-.75v-.75zM6.75 16.5h.75v.75h-.75v-.75zM16.5 6.75h.75v.75h-.75v-.75zM13.5 13.5h.75v.75h-.75v-.75zM16.5 16.5h.75v.75h-.75v-.75zM13.5 16.5h.75v.75h-.75v-.75zM16.5 13.5h.75v.75h-.75v-.75z" />
            </svg>
            <p>請掃描 Apple 外箱 QR Code 或於左側貼上網址進行解析</p>
          </div>
        </div>
      </section>

      <!-- 歷史紀錄面板 -->
      <section class="glass-panel history-panel">
        <div class="history-header">
          <h2 class="panel-title" style="margin-bottom:0;">掃描歷史紀錄</h2>
          <div class="history-actions">
            <button class="btn-action btn-action-primary" id="btn-export">匯出 Excel (CSV)</button>
            <button class="btn-action btn-action-danger" id="btn-clear-history">清除全部</button>
          </div>
        </div>
        
        <div class="history-list" id="history-list-container">
          <!-- 歷史紀錄行將由 JS 動態渲染 -->
        </div>
      </section>
    </div>

  </main>

  <!-- 鏡頭掃描彈出層 (Modal) -->
  <div class="modal" id="scan-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>後鏡頭掃描 QR Code</h3>
        <button class="btn-close" id="btn-close-scan" title="關閉">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="scanner-container">
        <!-- html5-qrcode 嵌入容器 -->
        <div id="reader"></div>
        
        <!-- 疊加科技感對焦框 -->
        <div class="scanner-overlay">
          <div class="scan-region-box">
            <div class="scan-corner corner-tl"></div>
            <div class="scan-corner corner-tr"></div>
            <div class="scan-corner corner-bl"></div>
            <div class="scan-corner corner-br"></div>
            <div class="crosshair-h"></div>
            <div class="crosshair-v"></div>
          </div>
        </div>
      </div>
      <!-- 縮放控制滑桿區 -->
      <div class="zoom-control-container" id="zoom-container" style="display: none;">
        <span class="zoom-label">縮放倍率</span>
        <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1">
        <span class="zoom-value" id="zoom-value-text">1.0x</span>
      </div>
    </div>
  </div>

  <footer>
    <p>APPLE 序號查詢工具 © 2026. 本機執行，資料安全不外流</p>
  </footer>

  <script>
    // 定義 GS1 AI 欄位的中英文對應名稱
    const GS1_FIELDS = {
      '01': { name: '商品條碼 / UPC / GTIN', desc: '全球統一商品識別碼' },
      '21': { name: '序號 / S/N', desc: '產品唯一序列號' },
      '8040': { name: '主要 IMEI 1', desc: '行動設備國際識別碼 1' },
      '8041': { name: '次要 IMEI 2', desc: '行動設備國際識別碼 2' },
      '8042': { name: 'eSIM EID', desc: 'eSIM 識別卡代碼' },
      '240': { name: '商品料號 / Part Number', desc: '產品型號 / MPN' },
      '8010': { name: '藍牙 ID / Bluetooth', desc: 'Bluetooth 識別碼' },
      '8011': { name: 'WiFi ID / MAC Address', desc: 'WiFi 網路卡卡號' },
      '8013': { name: '系列代碼 / Family ID', desc: '產品系列代碼' },
      '91': { name: '內部商品條碼 / JAN', desc: '日本商品條碼' },
      '92': { name: '乙太網路 ID / Ethernet', desc: '有線網路卡卡號' }
    };

    // 主要需要產生一維條碼且在頂部重點顯示的核心序號欄位
    const CORE_KEYS = ['8040', '8041', '8042', '21'];

    // DOM 元素引用
    const qrInput = document.getElementById('qr-input');
    const btnParse = document.getElementById('btn-parse');
    const btnScan = document.getElementById('btn-scan');
    const btnClear = document.getElementById('btn-clear');
    const btnCloseScan = document.getElementById('btn-close-scan');
    const scanModal = document.getElementById('scan-modal');
    const resultsContainer = document.getElementById('results-container');
    const emptyState = document.getElementById('empty-state');
    const errorBox = document.getElementById('error-message');
    const errorText = document.getElementById('error-text');
    const zoomContainer = document.getElementById('zoom-container');
    const zoomSlider = document.getElementById('zoom-slider');
    const zoomValueText = document.getElementById('zoom-value-text');
    const historyListContainer = document.getElementById('history-list-container');
    const btnExport = document.getElementById('btn-export');
    const btnClearHistory = document.getElementById('btn-clear-history');

    let html5QrcodeScanner = null;

    // 解析邏輯
    function parseAppleQrUrl(urlStr) {
      urlStr = urlStr.trim();

      if (!urlStr) {
        throw new Error("請輸入或掃描 QR Code 網址");
      }

      // 檢查是否包含 URL 協定頭，若無則視為無效格式
      if (!urlStr.toLowerCase().startsWith('http://') && !urlStr.toLowerCase().startsWith('https://')) {
        throw new Error("無法辨識此格式，外箱 QR Code 應為 https://boxinfo.apple.com 開頭之 GS1 網址");
      }

      const result = {};

      // 1. 解析 Path 中的 GTIN / UPC (AI 01)
      const gtinMatch = urlStr.match(/\/01\/(\d+)/);
      if (gtinMatch) {
        result['01'] = gtinMatch[1];
      }

      // 2. 解析 Path 中的 S/N (AI 21)
      const snMatch = urlStr.match(/\/21\/([^?&\/]+)/);
      if (snMatch) {
        let sn = snMatch[1];
        const aiSplit = sn.split(/(240|8010|8011|8013|91|92|8040|8041|8042)=/);
        if (aiSplit && aiSplit.length > 0) {
          sn = aiSplit[0];
        }
        result['21'] = sn;
      }

      // 3. 解析所有帶有 "=" 的參數鍵值對
      const queryParamsPattern = /(\d+)=([^&?#]+)/g;
      let match;
      while ((match = queryParamsPattern.exec(urlStr)) !== null) {
        const key = match[1];
        let val = match[2];
        try {
          val = decodeURIComponent(val);
        } catch (e) {
          // 若 decode 失敗則使用原始值
        }
        result[key] = val;
      }

      // 驗收條件 A07：無效內容的檢核
      const hasCoreData = result['01'] || result['21'] || result['8040'] || result['8042'];
      if (!hasCoreData) {
        throw new Error("無法辨識此 Apple QR Code 格式，請確認是否為正確的外箱條碼。");
      }

      return result;
    }

    // 顯示錯誤訊息
    function showError(message) {
      errorText.textContent = message;
      errorBox.style.display = 'flex';
      
      if (navigator.vibrate) {
        navigator.vibrate([100, 50, 100]);
      }
    }

    // 隱藏錯誤訊息
    function hideError() {
      errorBox.style.display = 'none';
    }

    // 清除所有狀態
    function clearAll() {
      qrInput.value = '';
      hideError();
      resultsContainer.innerHTML = '';
      resultsContainer.appendChild(emptyState);
      emptyState.style.display = 'flex';
      stopScanning();
    }

    // 複製功能
    function copyValue(text, buttonEl) {
      navigator.clipboard.writeText(text).then(() => {
        const originalText = buttonEl.innerHTML;
        buttonEl.textContent = '已複製 ✓';
        buttonEl.classList.add('copied');
        
        setTimeout(() => {
          buttonEl.innerHTML = originalText;
          buttonEl.classList.remove('copied');
        }, 2000);
      }).catch(err => {
        console.error("無法複製文字: ", err);
        alert("複製失敗，請手動複製。");
      });
    }

    // 渲染解析結果卡片
    function renderResults(parsedData) {
      resultsContainer.innerHTML = '';
      emptyState.style.display = 'none';

      const coreFields = [];
      const secondaryFields = [];

      Object.keys(parsedData).forEach(key => {
        const value = parsedData[key];
        const fieldInfo = GS1_FIELDS[key] || { name: `未知欄位 (AI ${key})`, desc: 'GS1 屬性識別碼' };
        
        const fieldObj = {
          key: key,
          value: value,
          name: fieldInfo.name,
          desc: fieldInfo.desc
        };

        if (CORE_KEYS.includes(key)) {
          coreFields.push(fieldObj);
        } else {
          secondaryFields.push(fieldObj);
        }
      });

      // 排序核心欄位
      coreFields.sort((a, b) => {
        const order = ['21', '8040', '8041', '8042'];
        return order.indexOf(a.key) - order.indexOf(b.key);
      });

      const allDisplayFields = [...coreFields, ...secondaryFields];

      allDisplayFields.forEach(field => {
        const card = document.createElement('div');
        card.className = 'result-card';

        const svgId = `barcode-${field.key}`;
        const isCore = CORE_KEYS.includes(field.key);
        
        card.innerHTML = `
          <div class="card-header">
              <span class="field-name">
                ${field.name}
              </span>
            <button class="btn-copy" onclick="copyValue('${field.value}', this)">
              複製
            </button>
          </div>
          <div class="field-value">${field.value}</div>
          ${isCore ? `<div class="barcode-wrapper"><svg id="${svgId}"></svg></div>` : ''}
        `;

        resultsContainer.appendChild(card);

        if (isCore) {
          try {
            JsBarcode(`#${svgId}`, field.value, {
              format: "CODE128",
              width: 2,
              height: 44,
              displayValue: true,
              fontOptions: "bold",
              fontSize: 13,
              font: "SFMono-Regular, Consolas, monospace",
              textMargin: 4,
              background: "#ffffff",
              lineColor: "#1d1d1f",
              margin: 8
            });
          } catch (barcodeErr) {
            console.error(`條碼 ${field.key} 生成失敗: `, barcodeErr);
            const barcodeDiv = card.querySelector('.barcode-wrapper');
            if (barcodeDiv) {
              barcodeDiv.style.background = '#ff453a0a';
              barcodeDiv.innerHTML = `<span style="color: #ff453a; font-size: 0.85rem; font-weight: 500;">⚠️ 無法生成一維條碼</span>`;
            }
          }
        }
      });
    }

    // 處理輸入解析並渲染
    function handleParse() {
      hideError();
      const inputText = qrInput.value;
      
      try {
        const parsed = parseAppleQrUrl(inputText);
        renderResults(parsed);
        addHistory(parsed); // 成功後寫入本機歷史紀錄
      } catch (err) {
        showError(err.message);
        resultsContainer.innerHTML = '';
        resultsContainer.appendChild(emptyState);
        emptyState.style.display = 'flex';
      }
    }

    // 監聽 input 事件
    qrInput.addEventListener('input', () => {
      const val = qrInput.value.trim();
      if (val.toLowerCase().startsWith('http://') || val.toLowerCase().startsWith('https://')) {
        handleParse();
      }
    });

    // 監聽 Enter 鍵
    qrInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleParse();
      }
    });

    // 啟動相機掃描
    function startScanning() {
      hideError();
      scanModal.classList.add('active');

      html5QrcodeScanner = new Html5Qrcode("reader");

      const config = {
        fps: 15,
        qrbox: function(width, height) {
          const minSize = Math.min(width, height);
          const boxSize = Math.floor(minSize * 0.65);
          return { width: boxSize, height: boxSize };
        },
        aspectRatio: 1.0
      };

      html5QrcodeScanner.start(
        { facingMode: "environment" },
        config,
        (decodedText) => {
          if (navigator.vibrate) {
            navigator.vibrate(80);
          }
          qrInput.value = decodedText;
          handleParse();
          stopScanning();
        },
        (errorMessage) => {
          // 靜默處理
        }
      ).then(() => {
        // 成功啟動後，檢查 Zoom 能力
        try {
          const capabilities = html5QrcodeScanner.getRunningTrackCapabilities();
          if (capabilities.zoom) {
            const settings = html5QrcodeScanner.getRunningTrackSettings();
            const currentZoom = settings.zoom || 1;
            
            zoomSlider.min = capabilities.zoom.min;
            zoomSlider.max = capabilities.zoom.max;
            zoomSlider.step = capabilities.zoom.step || 0.1;
            zoomSlider.value = currentZoom;
            zoomValueText.textContent = `${parseFloat(currentZoom).toFixed(1)}x`;
            
            zoomContainer.style.display = 'flex';
          } else {
            zoomContainer.style.display = 'none';
          }
        } catch (capErr) {
          console.warn("無法取得相機能力 (可能瀏覽器不支援縮放): ", capErr);
          zoomContainer.style.display = 'none';
        }
      }).catch(err => {
        console.error("相機啟動錯誤: ", err);
        scanModal.classList.remove('active');
        showError("無法啟動相機，請確保已授權相機權限，且網頁在 HTTPS 環境下執行。");
      });
    }

    // 停止相機掃描
    function stopScanning() {
      scanModal.classList.remove('active');
      zoomContainer.style.display = 'none'; // 隱藏縮放滑桿
      if (html5QrcodeScanner) {
        html5QrcodeScanner.stop().then(() => {
          html5QrcodeScanner = null;
        }).catch(err => {
          console.error("關閉相機錯誤: ", err);
        });
      }
    }

    // 事件監聽綁定
    btnParse.addEventListener('click', handleParse);
    btnScan.addEventListener('click', startScanning);
    btnClear.addEventListener('click', clearAll);
    btnCloseScan.addEventListener('click', stopScanning);
    btnExport.addEventListener('click', exportHistoryToCSV);
    btnClearHistory.addEventListener('click', clearAllHistory);

    scanModal.addEventListener('click', (e) => {
      if (e.target === scanModal) {
        stopScanning();
      }
    });

    // 監聽縮放滑桿變更
    zoomSlider.addEventListener('input', (e) => {
      const zoomVal = parseFloat(e.target.value);
      zoomValueText.textContent = `${zoomVal.toFixed(1)}x`;
      if (html5QrcodeScanner) {
        html5QrcodeScanner.applyVideoConstraints({
          advanced: [{ zoom: zoomVal }]
        }).catch(err => {
          console.error("無法套用縮放倍率: ", err);
        });
      }
    });

    // --- 歷史紀錄邏輯與方法 ---
    const LOCAL_STORAGE_KEY = 'apple_scan_history_records';

    // 讀取 localStorage 歷史
    function getHistory() {
      try {
        const data = localStorage.getItem(LOCAL_STORAGE_KEY);
        return data ? JSON.parse(data) : [];
      } catch (e) {
        console.error("無法讀取歷史紀錄: ", e);
        return [];
      }
    }

    // 寫入歷史紀錄
    function addHistory(parsedData) {
      const history = getHistory();
      const now = new Date();
      
      const formatTime = (d) => {
        const pad = (n) => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
      };

      // 檢查重複：若上一次掃描與本次的 SN 相同，則只更新時間並移到最前
      const sn = parsedData['21'] || '';
      const existingIdx = history.findIndex(item => item.sn === sn && sn !== '');
      
      const newItem = {
        id: String(Date.now()),
        timestamp: formatTime(now),
        gtin: parsedData['01'] || '',
        sn: sn,
        imei1: parsedData['8040'] || '',
        imei2: parsedData['8041'] || '',
        eid: parsedData['8042'] || '',
        partNumber: parsedData['240'] || ''
      };

      if (existingIdx !== -1) {
        history.splice(existingIdx, 1);
      }
      
      history.unshift(newItem);
      
      // 限制歷史紀錄最大筆數，例如 200 筆，避免超出 localStorage 限制
      if (history.length > 200) {
        history.pop();
      }

      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(history));
      renderHistory();
    }

    // 渲染歷史紀錄清單
    function renderHistory() {
      const history = getHistory();
      historyListContainer.innerHTML = '';

      if (history.length === 0) {
        historyListContainer.innerHTML = `<div class="history-empty">暫無掃描紀錄，請開始進行掃描或解析。</div>`;
        return;
      }

      history.forEach(item => {
        const row = document.createElement('div');
        row.className = 'history-row';

        row.innerHTML = `
          <div class="history-row-top">
            <span class="history-time">${item.timestamp}</span>
            <div class="history-row-actions">
              <button class="btn-row-action btn-row-action-danger" onclick="deleteHistoryItem('${item.id}')">刪除</button>
            </div>
          </div>
          <div class="history-details">
            ${item.sn ? `<div><span style="color: var(--text-secondary); font-weight: 500;">S/N序號 : </span><span class="history-val">${item.sn}</span></div>` : ''}
            ${item.imei1 ? `<div><span style="color: var(--text-secondary); font-weight: 500;">主要 IMEI1 : </span><span class="history-val">${item.imei1}</span></div>` : ''}
            ${item.eid ? `<div><span style="color: var(--text-secondary); font-weight: 500;">eSIM EID : </span><span class="history-val">${item.eid}</span></div>` : ''}
          </div>
        `;
        historyListContainer.appendChild(row);
      });
    }

    // 複製單筆歷史紀錄的核心數值
    window.copyHistoryText = function(id, buttonEl) {
      const history = getHistory();
      const item = history.find(i => i.id === id);
      if (!item) return;

      // 複製優先順序：S/N -> IMEI 1
      const copyVal = item.sn || item.imei1 || '';
      if (!copyVal) return;

      navigator.clipboard.writeText(copyVal).then(() => {
        const originalText = buttonEl.textContent;
        buttonEl.textContent = '已複製 ✓';
        buttonEl.style.color = '#30d158';

        setTimeout(() => {
          buttonEl.textContent = originalText;
          buttonEl.style.color = '';
        }, 1500);
      }).catch(err => {
        console.error("複製歷史紀錄數值失敗: ", err);
      });
    };

    // 刪除單筆紀錄
    window.deleteHistoryItem = function(id) {
      let history = getHistory();
      history = history.filter(item => item.id !== id);
      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(history));
      renderHistory();
    };

    // 清除全部歷史
    function clearAllHistory() {
      if (confirm("您確定要清除瀏覽器中所有的歷史掃描紀錄嗎？此動作將無法復原。")) {
        localStorage.removeItem(LOCAL_STORAGE_KEY);
        renderHistory();
      }
    }

    // 匯出 CSV 檔案
    function exportHistoryToCSV() {
      const history = getHistory();
      if (history.length === 0) {
        alert("目前沒有歷史紀錄可供匯出。");
        return;
      }

      // UTF-8 BOM, 防止 Excel 開啟中文亂碼
      let csvContent = "\uFEFF";
      csvContent += "掃描時間,商品條碼(UPC/GTIN),序號(S/N),主要IMEI 1,次要IMEI 2,eSIM EID\n";

      history.forEach(item => {
        // 使用 ="數值" 格式防止 Excel 自動把 EID 與 IMEI 轉為科學記號或吃掉前導零
        const row = [
          item.timestamp,
          item.gtin ? `="${item.gtin}"` : '""',
          item.sn ? `="${item.sn}"` : '""',
          item.imei1 ? `="${item.imei1}"` : '""',
          item.imei2 ? `="${item.imei2}"` : '""',
          item.eid ? `="${item.eid}"` : '""'
        ];
        csvContent += row.join(",") + "\n";
      });

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
      
      link.setAttribute("href", url);
      link.setAttribute("download", `APPLE_Scan_History_${dateStr}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // 網頁開啟時初始化渲染歷史紀錄
    renderHistory();
  </script>
</body>
